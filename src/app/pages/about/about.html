<section class="page">
  <app-terminal-line command="whoami" />

  <h1 class="page-title">{{ profile().name }}</h1>

  <div class="about-grid">
    <div class="bio">
      @for (para of profile().bio; track $index) {
        <p>{{ para }}</p>
      }
    </div>

    <app-panel title="id.card" accent="cyan">
      <dl class="specs font-mono">
        <div class="row">
          <dt>USER</dt>
          <dd>{{ profile().handle }}</dd>
        </div>
        <div class="row">
          <dt>ROLE</dt>
          <dd>{{ profile().role }}</dd>
        </div>
        <div class="row">
          <dt>LOC</dt>
          <dd>{{ profile().location }}</dd>
        </div>
        <div class="row">
          <dt>STATUS</dt>
          <dd class="ok">{{ profile().status }}</dd>
        </div>
        @for (spec of profile().specs; track spec.label) {
          <div class="row">
            <dt>{{ spec.label }}</dt>
            <dd>{{ spec.value }}</dd>
          </div>
        }
      </dl>
    </app-panel>
  </div>

  <app-hazard-divider />
</section>
